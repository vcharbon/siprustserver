apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: [pods, namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: observability
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Path_Key          file
        Exclude_Path      /var/log/containers/fluent-bit*.log,/var/log/containers/*_kube-system_*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Refresh_Interval  5
        Skip_Long_Lines   On
        DB                /var/log/fluent-bit-tail.db

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [OUTPUT]
        Name              http
        Match             kube.*
        Host              __HOST_IP__
        Port              9428
        URI               /insert/jsonline?_stream_fields=stream,kubernetes_pod_name,kubernetes_namespace_name,kubernetes_container_name&_msg_field=log&_time_field=date
        Format            json_lines
        Json_date_format  iso8601
        Json_date_key     date
        compress          gzip

  parsers.conf: |
    [PARSER]
        Name    docker
        Format  json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: observability
  labels: { app: fluent-bit }
spec:
  selector:
    matchLabels: { app: fluent-bit }
  template:
    metadata:
      labels: { app: fluent-bit }
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1.10
          ports:
            - { name: http, containerPort: 2020 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 300m, memory: 256Mi }
          volumeMounts:
            - { name: varlog,        mountPath: /var/log }
            - { name: varlibdocker,  mountPath: /var/lib/docker/containers, readOnly: true }
            - { name: config,        mountPath: /fluent-bit/etc/fluent-bit.conf, subPath: fluent-bit.conf }
            - { name: config,        mountPath: /fluent-bit/etc/parsers.conf,    subPath: parsers.conf }
      volumes:
        - { name: varlog,       hostPath: { path: /var/log } }
        - { name: varlibdocker, hostPath: { path: /var/lib/docker/containers } }
        - { name: config,       configMap: { name: fluent-bit-config } }
