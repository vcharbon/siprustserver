# B2BUA worker pool. A StatefulSet (not Deployment) so each worker has a stable
# ordinal (b2bua-worker-0, -1, ...) used as B2BUA_ORDINAL (encoded into callRef
# for the proxy's partition routing AND matched against the membership ordinal
# the K8sMembership informer derives from each EndpointSlice's targetRef.name —
# so callRef ownership and replication membership agree by construction). Routes
# every call to the sipp-uas Service (B2BUA_DEST resolves DNS at startup).
# Pinned to tier=app like the sipjs worker.
#
# HA replication (S11) is opt-in via ${REPL_ENABLE} (default "0" for the plain
# load runner; the chaos suite sets "1"). When on, each worker:
#   - serves its changelog on the repl TCP port (B2BUA_REPL_LISTEN);
#   - discovers peers by watching the headless b2bua-worker Service's
#     EndpointSlices (needs the 15-worker-rbac ServiceAccount/Role);
#   - reaches every peer at peer-pod-IP:${REPL_PORT};
#   - reports NotReady via /ready until re-hydrated + backup-current, and
#     Draining on SIGTERM (terminationGracePeriodSeconds gives drain headroom).
#
# Image: ${SUT_IMAGE} (default siprustserver:dev), command = b2bua-runner.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: b2bua-worker
  namespace: sip-test
  labels: { app: b2bua-worker }
spec:
  serviceName: b2bua-worker
  replicas: ${WORKER_REPLICAS}
  selector: { matchLabels: { app: b2bua-worker } }
  template:
    metadata:
      labels: { app: b2bua-worker }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      serviceAccountName: b2bua-worker
      nodeSelector: { tier: app }
      # Drain grace: SIGTERM latches Draining (OPTIONS 503 + /ready NotReady),
      # the runner waits B2BUA_DRAIN_GRACE_MS, then exits. Keep this > grace.
      terminationGracePeriodSeconds: 30
      containers:
        - name: b2bua-worker
          image: ${SUT_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/b2bua-runner"]
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # Pod IP via the downward API: the routable address peers (callee /
            # proxy) must reach us on. The bind addr is 0.0.0.0 (all interfaces),
            # which is NOT routable — without this the B2BUA stamps 0.0.0.0 into
            # its Via/Contact/b-leg Call-ID, every response goes nowhere, and the
            # worker retransmits then CANCELs into a storm. B2BUA_ADVERTISE pins
            # the SIP identity to this IP (port from B2BUA_LISTEN, 5060).
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - { name: B2BUA_LISTEN,  value: "0.0.0.0:5060" }
            - { name: B2BUA_ADVERTISE, value: "$(POD_IP)" }
            - { name: B2BUA_DEST,    value: "sipp-uas.sip-test.svc.cluster.local:5060" }
            # ALL worker→callee (b-leg) SIP MUST traverse the front proxy. In a
            # real cluster a peer's internal pod IP is not routable peer-to-peer,
            # so every B2BUA-originated request — initial b-leg INVITE, in-dialog
            # BYE / keepalive OPTIONS / re-INVITE — is sent to the proxy VIP with a
            # preloaded Route ;lr;outbound. The proxy strips that Route, classifies
            # the flow worker-outbound (registry-/IP-independent, so it survives a
            # worker reboot onto a new pod IP), forwards to the callee, and
            # record-routes itself into the b-leg so subsequent in-dialog requests
            # stay on the proxy path. Without this the b-leg goes pod-direct and
            # bypasses the LB — the endurance long-call-loss class (post-reboot
            # b-leg keepalives to a pod IP get no 200 → keepalive-timeout → BYE).
            # The VIP is the keepalived VRRP address (ADR-0012 D7), stable across
            # proxy failover and pod restart.
            - { name: B2BUA_OUTBOUND_PROXY, value: "${PROXY_VIP}:5060" }
            - { name: B2BUA_METRICS, value: "0.0.0.0:9091" }
            # In-dialog OPTIONS keepalive interval (5 min). Must exceed short-call
            # hold so it never pokes a completing dialog; long-hold scenarios
            # (uac-long-options) answer it to stay up. Default in code is 300.
            # LOAD-BEARING for ADR-0011 X11 fail-back: the backup-Element reaper
            # evicts at 1.5x this interval and tolerates a reboot+rehydrate of only
            # 0.5x (450s / 150s here). Do NOT lower it for endurance — a shorter
            # interval shrinks the reboot budget below pod-restart time and
            # manufactures fake replica-reap / failover-loss artifacts.
            - { name: B2BUA_KEEPALIVE_SEC, value: "300" }
            # Keepalive-timeout grace: how long to wait for the in-dialog OPTIONS
            # 200 before declaring the leg dead and BYE-ing. Was a hard 5 s, which
            # tore down healthy RECLAIMED dialogs across a reboot (their re-armed
            # keepalive OPTIONS round-trip into a still-settling path: smoothed
            # reclaim burst + proxy re-discovering the new pod IP). 45 s rides that
            # recovery window out; stays well under the 300 s keepalive interval.
            - { name: B2BUA_KEEPALIVE_TIMEOUT_SEC, value: "45" }
            # Ordinal = pod name (stable per StatefulSet replica == membership ordinal).
            - { name: B2BUA_ORDINAL, value: "$(POD_NAME)" }
            # --- call limiter ---
            # The shared limiter service (50-call-limiter). The scripted decision
            # backend attaches B2BUA_STRESS_LIMITER (below) to EVERY call, so the
            # full admit/release/refresh chain is exercised on all traffic; a call
            # that also carries an X-Api-Call `call_limiter` entry (the endurance
            # limiter stream) is additionally capped by it. LIMITER_WINDOW_SECONDS
            # MUST match the service's window (it sets the refresh cadence).
            - { name: LIMITER_URL,            value: "call-limiter.sip-test.svc.cluster.local:8080" }
            - { name: LIMITER_WINDOW_SECONDS, value: "300" }
            - { name: LIMITER_TIMEOUT_MS,     value: "150" }
            # Always-on high-cap "stress" entry: never rejects (cap 999999) but
            # makes every call traverse the limiter so the chain is load-tested
            # end to end. Set ID empty to disable.
            - { name: B2BUA_STRESS_LIMITER_ID,    value: "global-stress" }
            - { name: B2BUA_STRESS_LIMITER_LIMIT, value: "999999" }
            # --- replication (opt-in) ---
            - { name: B2BUA_REPL,           value: "${REPL_ENABLE}" }
            - { name: B2BUA_REPL_LISTEN,    value: "0.0.0.0:${REPL_PORT}" }
            - { name: B2BUA_REPL_PORT,      value: "${REPL_PORT}" }
            - { name: B2BUA_REPL_SERVICE,   value: "b2bua-worker" }
            - { name: B2BUA_DRAIN_GRACE_MS, value: "5000" }
          ports:
            - { name: sip,     containerPort: 5060, protocol: UDP }
            - { name: metrics, containerPort: 9091, protocol: TCP }
            - name: repl
              containerPort: ${REPL_PORT}
              protocol: TCP
          # Readiness reflects replication state: /ready returns 503 while the
          # worker is re-hydrating or draining, so the EndpointSlice the proxy
          # (and peers) watch drops it from the ready set — k8s respects
          # NotReady/Draining exactly as the worker's OPTIONS self-report does.
          readinessProbe:
            httpGet: { path: /ready, port: 9091 }
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 2
          resources:
            requests: { cpu: "250m", memory: "128Mi" }
            # Headroom for a fully-ramped 2h profile: long(~6000) + short(~3000)
            # split across 2 workers ≈ 4500 live dialogs each, plus the per-call
            # replication changelog. 512Mi OOM-killed under that load (the killed
            # worker then drops its calls → cascading churn), so give 1Gi.
            limits:   { memory: "1Gi" }
---
# Headless service: gives each worker stable DNS (b2bua-worker-0.b2bua-worker...)
# and — crucially for replication — is the Service whose EndpointSlices the
# K8sMembership informer watches to discover the peer set. Exposes the repl port
# so peers can connect. `publishNotReadyAddresses: false` (the default) means a
# NotReady/draining worker drops out of the slice, which is what gates routing.
apiVersion: v1
kind: Service
metadata:
  name: b2bua-worker
  namespace: sip-test
spec:
  clusterIP: None
  selector: { app: b2bua-worker }
  ports:
    - { name: sip,     port: 5060, targetPort: 5060, protocol: UDP }
    - { name: metrics, port: 9091, targetPort: 9091, protocol: TCP }
    - name: repl
      port: ${REPL_PORT}
      targetPort: ${REPL_PORT}
      protocol: TCP
