# SIP front proxy + load balancer — HIGH-AVAILABILITY (ADR-0012 D7).
#
# TWO anti-affined replicas on the two tier=edge nodes, fronted by a keepalived
# VRRP virtual IP (${PROXY_VIP}, the top of the configurable kind SIP_SUBNET).
# Active/passive: the VRRP master owns the VIP and serves ALL traffic; the backup
# is warm (its OPTIONS health probes source from its own node IP — the runner
# binds a SEPARATE ephemeral probe socket — so it keeps a live worker view and its
# /readyz passes). On master loss the backup claims the VIP in <2s. Because the
# proxy advertises the *VIP* (stable across failover AND pod restart) in
# Record-Route, in-dialog BYE/keepalives never get orphaned the way a per-pod-IP
# advertise did, and the HMAC stickiness cookie + worker P2P replication
# (ADR-0011) keep in-dialog routing + worker failover correct from either proxy.
# Active/passive keeps the per-pod cancel_lru (CANCEL/ACK correlation) coherent.
#
# The worker pool is discovered from k8s EndpointSlices via the shared
# topology::K8sMembership informer (ADR-0012 D4); the proxy reaches each worker at
# its Pod IP. Needs the 25-proxy-rbac ServiceAccount/RoleBinding for the watch.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sip-front-proxy-keepalived
  namespace: sip-test
  labels: { app: sip-front-proxy }
data:
  keepalived.conf: |
    # Identical on both pods. state BACKUP + nopreempt => the first pod up wins
    # the VIP and keeps it across peer reboots (no flapping). Multicast VRRP — the
    # kind Docker bridge floods link-local 224.0.0.18 between the edge nodes.
    global_defs {
        router_id sip-front-proxy
        enable_script_security
        script_user root
    }
    # Gate mastership on the proxy process actually running (newkahneed-038).
    # shareProcessNamespace on the pod lets this sidecar pgrep the proxy
    # container's process. init_fail => a fresh keepalived starts FAULT and only
    # claims the VIP once the proxy is up, so proxy/keepalived container start
    # order no longer matters: the VIP is only ever served where a proxy runs.
    # No `weight` => script failure drives the instance to FAULT (VIP released,
    # peer takes over) rather than a priority nudge nopreempt would ignore.
    # pgrep -f (full cmdline): the comm name truncates at 15 chars so -x would
    # never match "sip-proxy-runner"; keepalived execs this directly (no shell
    # wrapper), so pgrep's self-exclusion keeps -f from matching itself.
    vrrp_script chk_proxy {
        script "/usr/bin/pgrep -f sip-proxy-runner"
        interval 2
        timeout 2
        rise 1
        fall 2
        init_fail
    }
    vrrp_instance VI_SIP {
        state BACKUP
        interface eth0
        virtual_router_id 51
        priority 100
        advert_int 0.5
        nopreempt
        # GARP hardening (newkahneed-038): on a FRESHLY-created kind docker
        # bridge the default single gratuitous-ARP burst at election is easily
        # lost while veth/FDB state is still settling, and it was never
        # re-asserted — neighbour ARP caches kept a dead VIP->MAC binding
        # indefinitely (responses sourced from VIP:5060 never returned until a
        # manual proxy restart forced a re-election). Repeat the transition
        # burst and refresh the claim periodically so any lost/stale binding
        # self-heals within ~garp_master_refresh seconds.
        garp_master_delay 1
        garp_master_repeat 5
        garp_master_refresh 10
        garp_master_refresh_repeat 2
        virtual_ipaddress {
            ${PROXY_VIP}
        }
        track_script {
            chk_proxy
        }
        # Keep the VIP on lo at all times so either pod can bind(VIP:5060) and use
        # it as the outbound source IP for forwarded SIP (source-IP discipline).
        notify_master "/bin/sh -c 'ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null || true'"
        notify_backup "/bin/sh -c 'ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null || true'"
        notify_fault  "/bin/sh -c 'ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null || true'"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sip-front-proxy
  namespace: sip-test
  labels: { app: sip-front-proxy }
spec:
  replicas: 2
  selector: { matchLabels: { app: sip-front-proxy } }
  # maxSurge:0 / maxUnavailable:1 is the only shape compatible with the hard
  # anti-affinity + 2 edge nodes (no room for a surged 3rd pod). One slot rolls at
  # a time; the brief VIP gap during the swap is covered by keepalived re-election
  # + SIP T1/T2 retransmit. A fleet with >=3 edge nodes can use maxSurge:1.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  template:
    metadata:
      labels: { app: sip-front-proxy }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: sip-front-proxy
      nodeSelector: { tier: edge }
      terminationGracePeriodSeconds: 30
      # VIP requires hostNetwork so keepalived can answer ARP on the node's eth0;
      # the two pods must land on different edge nodes (anti-affinity below).
      # shareProcessNamespace lets the keepalived chk_proxy vrrp_script pgrep the
      # proxy process — mastership is gated on the proxy actually running.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      shareProcessNamespace: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: { matchLabels: { app: sip-front-proxy } }
              topologyKey: kubernetes.io/hostname
      # Pre-bind the VIP on lo + strict-ARP BEFORE the proxy starts, so the
      # proxy's bind(VIP:5060) succeeds even on the backup (keepalived's notify
      # scripts only fire after it elects — an EADDRNOTAVAIL race otherwise).
      initContainers:
        - name: vip-loopback
          image: siprustserver-keepalived:dev
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null || \
                ip addr show dev lo | grep -q "${PROXY_VIP}/32"
              # strict-ARP (LVS/DSR fix): with the VIP on lo on BOTH nodes, only
              # the interface that actually owns the IP should answer ARP, else
              # both eth0s reply and client traffic flaps. Write /proc/sys directly
              # (no sysctl binary dependency).
              echo 1 > /proc/sys/net/ipv4/conf/all/arp_ignore
              echo 2 > /proc/sys/net/ipv4/conf/all/arp_announce
              echo 1 > /proc/sys/net/ipv4/conf/lo/arp_ignore
              echo 2 > /proc/sys/net/ipv4/conf/lo/arp_announce
              echo "vip-loopback: ${PROXY_VIP}/32 + strict-ARP ready"
          securityContext:
            privileged: true
            capabilities: { add: ["NET_ADMIN"] }
      containers:
        - name: sip-front-proxy
          image: ${SUT_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/sip-proxy-runner"]
          env:
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # Bind + advertise the VIP. Listening on the VIP sources forwarded SIP
            # from the VIP (responses return to the master); the OPTIONS health
            # probe uses a SEPARATE 0.0.0.0:0 socket so the backup still probes
            # from its node IP and stays warm.
            - { name: PROXY_LISTEN,    value: "${PROXY_VIP}:${SIP_PORT}" }
            - { name: PROXY_ADVERTISE, value: "${PROXY_VIP}:${SIP_PORT}" }
            - { name: PROXY_METRICS,   value: "0.0.0.0:9090" }
            # Worker pool discovered from k8s (ADR-0012 D4). PROXY_WORKERS UNSET →
            # EndpointSlice informer over the headless worker Service.
            - { name: PROXY_WORKER_SERVICE, value: "b2bua-worker" }
            - { name: PROXY_WORKER_PORT,    value: "5060" }
            # B-leg next-hop DNS warm cache (newkahneed-037): the proxy resolves
            # non-IP R-URI hosts off the forwarding path with a TTL cache +
            # pre-expiry refresh, and qualifies dotted names absolutely to dodge
            # the kube ndots:5 search-expansion tax. Overlays whose b-leg targets
            # are known Service FQDNs should pin them warm at startup so even the
            # FIRST call after a fresh deploy / CoreDNS restart forwards
            # warm-equivalent, e.g.:
            # - { name: PROXY_RESOLVER_PREWARM, value: "newkah-loadgen.sip-test.svc.cluster.local:6001,sipp-uas.sip-test.svc.cluster.local:5060" }
            # The binary uses jemalloc (#[global_allocator], see sip-proxy-runner
            # src/main.rs); aggressive decay returns freed pages to the OS quickly.
            # Confirm it parsed via the jemalloc_opt_*_decay_ms gauges on /metrics
            # (a typo here is silently ignored). (_RJEM_ prefix = tikv-jemalloc.)
            - { name: _RJEM_MALLOC_CONF,    value: "dirty_decay_ms:1000,muzzy_decay_ms:1000" }
          ports:
            # containerPort is cosmetic under hostNetwork (the real bind is
            # PROXY_LISTEN=${PROXY_VIP}:${SIP_PORT}); kept at 5060 as a label only.
            - { name: sip,     containerPort: 5060, protocol: UDP }
            - { name: metrics, containerPort: 9090, protocol: TCP }
          # Readiness gates on >=1 routable (Alive) worker (ADR-0012 D4). Liveness
          # is separate (process up) so the warm backup is never killed for having
          # no traffic. kubelet probes node-IP:9090 (hostNetwork).
          # NOTE (newkahneed-038): /readyz deliberately does NOT gate on "this pod
          # is VRRP master / the VIP serves" — the warm backup must stay Ready or
          # the Deployment rollout could never complete. A same-node self-probe
          # also cannot observe the actual failure mode (stale VIP ARP on OTHER
          # nodes' caches). The functional response-path check therefore lives at
          # deploy level: run.sh vip_smoke() sends an OPTIONS through the VIP from
          # a tier=load vantage and blocks the deploy until a response returns.
          readinessProbe:
            httpGet: { path: /readyz, port: 9090 }
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 9090 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "64Mi" }
            limits:   { memory: "512Mi" }
        # VRRP sidecar — owns the shared VIP. preStop drops the VIP immediately so
        # the standby promotes before SIGTERM reaches the proxy container.
        - name: keepalived
          image: siprustserver-keepalived:dev
          imagePullPolicy: IfNotPresent
          command: ["/usr/sbin/keepalived"]
          args: ["--dont-fork", "--log-console", "--log-detail", "--use-file=/etc/keepalived/keepalived.conf"]
          securityContext:
            capabilities: { add: ["NET_ADMIN", "NET_BROADCAST", "NET_RAW"] }
          lifecycle:
            preStop:
              exec: { command: ["/bin/sh", "-c", "pkill keepalived; sleep 1"] }
          volumeMounts:
            - { name: keepalived-conf, mountPath: /etc/keepalived, readOnly: true }
      volumes:
        - name: keepalived-conf
          configMap: { name: sip-front-proxy-keepalived }
---
# Metrics-only Service (SIP now flows through the VIP, not this ClusterIP). Kept
# so the Prometheus targets + /readyz resolve via the pod annotations.
apiVersion: v1
kind: Service
metadata:
  name: sip-front-proxy
  namespace: sip-test
spec:
  selector: { app: sip-front-proxy }
  ports:
    - { name: metrics, port: 9090, targetPort: 9090, protocol: TCP }
