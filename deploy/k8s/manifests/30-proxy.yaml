# SIP front proxy + load balancer — HIGH-AVAILABILITY (ADR-0012 D7), DUAL-FACE
# (sipext dual-plane layout).
#
# TWO anti-affined replicas on the two tier=edge nodes — the only dual-homed
# components in the cluster: internal face on the kind bridge, external face on
# the no-NAT `sipext` bridge (run.sh connects the edge nodes; callers/loadgen
# live there as plain docker containers). ONE keepalived VRRP instance floats
# BOTH identities together: ${PROXY_VIP} (internal, worker-facing, top of
# SIP_SUBNET) and ${SIPEXT_VIP} (external, caller-facing, top of SIPEXT_SUBNET).
# Active/passive: the VRRP master owns both VIPs and serves ALL traffic; the
# backup is warm (its OPTIONS health probes source from its own node IP — the
# runner binds a SEPARATE ephemeral probe socket — so it keeps a live worker
# view and its /readyz passes). On master loss the backup claims both VIPs in
# <2s. Because the proxy advertises the *VIPs* (stable across failover AND pod
# restart) in Via/Record-Route, in-dialog BYE/keepalives never get orphaned the
# way a per-pod-IP advertise did, and the HMAC stickiness cookie + worker P2P
# replication (ADR-0011) keep in-dialog routing + worker failover correct from
# either proxy. Active/passive keeps the per-pod cancel_lru (CANCEL/ACK
# correlation) coherent. Isolation invariant: ONLY the proxy bridges the two
# planes — workers are unreachable from sipext (gated by run.sh smokes).
#
# The worker pool is discovered from k8s EndpointSlices via the shared
# topology::K8sMembership informer (ADR-0012 D4); the proxy reaches each worker at
# its Pod IP. Needs the 25-proxy-rbac ServiceAccount/RoleBinding for the watch.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sip-front-proxy-keepalived
  namespace: sip-test
  labels: { app: sip-front-proxy }
data:
  keepalived.conf: |
    # Identical on both pods. state BACKUP + nopreempt => the first pod up wins
    # the VIPs and keeps them across peer reboots (no flapping). Multicast VRRP —
    # a docker bridge floods link-local 224.0.0.18 between the edge nodes.
    #
    # DUAL-PLANE (sipext layout): ONE vrrp_instance owns BOTH identities — the
    # internal VIP (${PROXY_VIP} on ${SIP_IF}, worker-facing) and the external
    # VIP (${SIPEXT_VIP} on ${SIPEXT_IF}, caller-facing). One election, adverts
    # on the INTERNAL plane, per-address `dev` — the two faces of the dual-face
    # proxy can NEVER split across pods. track_interface drives the instance to
    # FAULT if the external iface disappears (chaos cut_external_plane / carrier
    # loss) so the peer takes both VIPs together.
    #
    # NO exec-based vrrp_script (newkahneed-040 absorbed): the 038 chk_proxy
    # pgrep track_script latched a startup-window execve failure (exit 127) and
    # pinned BOTH nodes in FAULT — dead VIP. Interface tracking is native
    # netlink (nothing to exec, nothing to latch); the functional response-path
    # gate is run.sh vip_smoke at deploy time. If process-gating ever returns,
    # it must be a /bin/sh -c-wrapped predicate clamped to exit 0/1 and land
    # together with a staggered-start acceptance test (040 §Ask).
    global_defs {
        router_id sip-front-proxy
    }
    vrrp_instance VI_SIP {
        state BACKUP
        interface ${SIP_IF}
        virtual_router_id 51
        priority 100
        advert_int 0.5
        nopreempt
        # GARP hardening (newkahneed-038): on a FRESHLY-created docker bridge
        # the default single gratuitous-ARP burst at election is easily lost
        # while veth/FDB state is still settling, and it was never re-asserted —
        # neighbour ARP caches kept a dead VIP->MAC binding indefinitely.
        # Repeat the transition burst and refresh the claim periodically so any
        # lost/stale binding self-heals within ~garp_master_refresh seconds.
        # Applies PER ADDRESS, i.e. to both planes — sipext is recreated fresh
        # on every `up`, exactly the lost-GARP condition.
        garp_master_delay 1
        garp_master_repeat 5
        garp_master_refresh 10
        garp_master_refresh_repeat 2
        virtual_ipaddress {
            ${PROXY_VIP} dev ${SIP_IF}
            ${SIPEXT_VIP} dev ${SIPEXT_IF}
        }
        track_interface {
            ${SIPEXT_IF}
        }
        # Keep BOTH VIPs on lo at all times so either pod can bind(VIP:5060) on
        # each face and use them as outbound source IPs (source-IP discipline).
        notify_master "/bin/sh -c 'ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null; ip addr add ${SIPEXT_VIP}/32 dev lo 2>/dev/null; true'"
        notify_backup "/bin/sh -c 'ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null; ip addr add ${SIPEXT_VIP}/32 dev lo 2>/dev/null; true'"
        notify_fault  "/bin/sh -c 'ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null; ip addr add ${SIPEXT_VIP}/32 dev lo 2>/dev/null; true'"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sip-front-proxy
  namespace: sip-test
  labels: { app: sip-front-proxy }
spec:
  replicas: 2
  selector: { matchLabels: { app: sip-front-proxy } }
  # maxSurge:0 / maxUnavailable:1 is the only shape compatible with the hard
  # anti-affinity + 2 edge nodes (no room for a surged 3rd pod). One slot rolls at
  # a time; the brief VIP gap during the swap is covered by keepalived re-election
  # + SIP T1/T2 retransmit. A fleet with >=3 edge nodes can use maxSurge:1.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  template:
    metadata:
      labels: { app: sip-front-proxy }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: sip-front-proxy
      nodeSelector: { tier: edge }
      terminationGracePeriodSeconds: 30
      # VIPs require hostNetwork so keepalived can answer ARP on the node's
      # interfaces (internal ${SIP_IF} + external ${SIPEXT_IF} — the edge nodes
      # are the only dual-homed components; `run.sh up` connects them to the
      # sipext bridge). The two pods must land on different edge nodes
      # (anti-affinity below). shareProcessNamespace REMOVED with chk_proxy
      # (newkahneed-040) — nothing pgreps across containers anymore.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: { matchLabels: { app: sip-front-proxy } }
              topologyKey: kubernetes.io/hostname
      # Pre-bind BOTH VIPs on lo + strict-ARP BEFORE the proxy starts, so the
      # proxy's bind(VIP:5060) on each face succeeds even on the backup
      # (keepalived's notify scripts only fire after it elects — an
      # EADDRNOTAVAIL race otherwise).
      initContainers:
        - name: vip-loopback
          image: siprustserver-keepalived:dev
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ip addr add ${PROXY_VIP}/32 dev lo 2>/dev/null || \
                ip addr show dev lo | grep -q "${PROXY_VIP}/32"
              ip addr add ${SIPEXT_VIP}/32 dev lo 2>/dev/null || \
                ip addr show dev lo | grep -q "${SIPEXT_VIP}/32"
              # strict-ARP (LVS/DSR fix): with the VIPs on lo on BOTH nodes, only
              # the interface that actually owns the IP should answer ARP, else
              # both nodes reply and client traffic flaps. conf/all covers the
              # external ${SIPEXT_IF} as well. Write /proc/sys directly (no
              # sysctl binary dependency).
              echo 1 > /proc/sys/net/ipv4/conf/all/arp_ignore
              echo 2 > /proc/sys/net/ipv4/conf/all/arp_announce
              echo 1 > /proc/sys/net/ipv4/conf/lo/arp_ignore
              echo 2 > /proc/sys/net/ipv4/conf/lo/arp_announce
              echo "vip-loopback: ${PROXY_VIP}/32 + ${SIPEXT_VIP}/32 + strict-ARP ready"
          securityContext:
            privileged: true
            capabilities: { add: ["NET_ADMIN"] }
      containers:
        - name: sip-front-proxy
          image: ${SUT_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/sip-proxy-runner"]
          env:
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # Bind + advertise the VIP. Listening on the VIP sources forwarded SIP
            # from the VIP (responses return to the master); the OPTIONS health
            # probe uses a SEPARATE 0.0.0.0:0 socket so the backup still probes
            # from its node IP and stays warm.
            - { name: PROXY_LISTEN,    value: "${PROXY_VIP}:${SIP_PORT}" }
            - { name: PROXY_ADVERTISE, value: "${PROXY_VIP}:${SIP_PORT}" }
            # Dual-face mode (sipext layout): a SECOND socket on the external
            # VIP serves the caller-facing plane. Egress face-picker: dest ∈
            # PROXY_FACE_INT_CIDRS (pod CIDR + internal kind subnet) leaves on
            # the internal face sourced from ${PROXY_VIP}; everything else
            # leaves on the external face sourced from ${SIPEXT_VIP}. Forwarding
            # between faces double-Record-Routes (RFC 3261 §16.6/16.7); workers
            # never see a sipext address they could dial directly.
            - { name: PROXY_LISTEN_EXT,      value: "${SIPEXT_VIP}:${SIP_PORT}" }
            - { name: PROXY_ADVERTISE_EXT,   value: "${SIPEXT_VIP}:${SIP_PORT}" }
            - { name: PROXY_FACE_INT_CIDRS,  value: "${PROXY_FACE_INT_CIDRS}" }
            - { name: PROXY_METRICS,   value: "0.0.0.0:9090" }
            # Worker pool discovered from k8s (ADR-0012 D4). PROXY_WORKERS UNSET →
            # EndpointSlice informer over the headless worker Service.
            - { name: PROXY_WORKER_SERVICE, value: "b2bua-worker" }
            - { name: PROXY_WORKER_PORT,    value: "5060" }
            # B-leg next-hop DNS warm cache (newkahneed-037): the proxy resolves
            # non-IP R-URI hosts off the forwarding path with a TTL cache +
            # pre-expiry refresh, and qualifies dotted names absolutely to dodge
            # the kube ndots:5 search-expansion tax. Overlays whose b-leg targets
            # are known Service FQDNs should pin them warm at startup so even the
            # FIRST call after a fresh deploy / CoreDNS restart forwards
            # warm-equivalent, e.g.:
            # - { name: PROXY_RESOLVER_PREWARM, value: "newkah-loadgen.sip-test.svc.cluster.local:6001,sipp-uas.sip-test.svc.cluster.local:5060" }
            # The binary uses jemalloc (#[global_allocator], see sip-proxy-runner
            # src/main.rs); aggressive decay returns freed pages to the OS quickly.
            # Confirm it parsed via the jemalloc_opt_*_decay_ms gauges on /metrics
            # (a typo here is silently ignored). (_RJEM_ prefix = tikv-jemalloc.)
            - { name: _RJEM_MALLOC_CONF,    value: "dirty_decay_ms:1000,muzzy_decay_ms:1000" }
          ports:
            # containerPort is cosmetic under hostNetwork (the real bind is
            # PROXY_LISTEN=${PROXY_VIP}:${SIP_PORT}); kept at 5060 as a label only.
            - { name: sip,     containerPort: 5060, protocol: UDP }
            - { name: metrics, containerPort: 9090, protocol: TCP }
          # Readiness gates on >=1 routable (Alive) worker (ADR-0012 D4). Liveness
          # is separate (process up) so the warm backup is never killed for having
          # no traffic. kubelet probes node-IP:9090 (hostNetwork).
          # NOTE (newkahneed-038): /readyz deliberately does NOT gate on "this pod
          # is VRRP master / the VIP serves" — the warm backup must stay Ready or
          # the Deployment rollout could never complete. A same-node self-probe
          # also cannot observe the actual failure mode (stale VIP ARP on OTHER
          # nodes' caches). The functional response-path check therefore lives at
          # deploy level: run.sh vip_smoke() sends an OPTIONS through the EXTERNAL
          # VIP from a throwaway container on the sipext bridge — the same vantage
          # as real callers — and blocks the deploy until a response returns.
          readinessProbe:
            httpGet: { path: /readyz, port: 9090 }
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 9090 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "64Mi" }
            limits:   { memory: "512Mi" }
        # VRRP sidecar — owns the shared VIP. preStop drops the VIP immediately so
        # the standby promotes before SIGTERM reaches the proxy container.
        - name: keepalived
          image: siprustserver-keepalived:dev
          imagePullPolicy: IfNotPresent
          command: ["/usr/sbin/keepalived"]
          args: ["--dont-fork", "--log-console", "--log-detail", "--use-file=/etc/keepalived/keepalived.conf"]
          securityContext:
            capabilities: { add: ["NET_ADMIN", "NET_BROADCAST", "NET_RAW"] }
          lifecycle:
            preStop:
              exec: { command: ["/bin/sh", "-c", "pkill keepalived; sleep 1"] }
          volumeMounts:
            - { name: keepalived-conf, mountPath: /etc/keepalived, readOnly: true }
      volumes:
        - name: keepalived-conf
          configMap: { name: sip-front-proxy-keepalived }
---
# Metrics-only Service (SIP now flows through the VIP, not this ClusterIP). Kept
# so the Prometheus targets + /readyz resolve via the pod annotations.
apiVersion: v1
kind: Service
metadata:
  name: sip-front-proxy
  namespace: sip-test
spec:
  selector: { app: sip-front-proxy }
  ports:
    - { name: metrics, port: 9090, targetPort: 9090, protocol: TCP }
