# Downstream SIPp UAS: answers INVITE / 180 / (ring) / 200 / ACK / BYE.
# Uses the shared sipp:dev image (built from sipjsserver's sipp chart Dockerfile)
# and the shared uas-basic.xml scenario (mounted from the sipp-scenarios CM that
# run.sh builds out of the symlinked scenarios dir). Pinned to tier=load so the
# load generators sit off the proxy/worker nodes, mirroring the sipjs topology.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sipp-uas
  namespace: sip-test
  labels: { app: sipp-uas }
spec:
  # Scaled out 1 -> 2 (one per tier=load node) after the single replica self-
  # terminated with exit 255 at ~5760 concurrent calls. PROVEN ROOT CAUSE (from
  # the crashed pod's `kubectl logs --previous`): a SIPp v3.7.7 INTERNAL timer-
  # wheel abort —
  #   "wheel_base is 939155, clock_tick is 939154 - expected wheel_base to be
  #    less than or equal to clock_tick"
  # NOT OOM (k8s Reason=Error/255, never 137; RSS ~132MB << 1Gi; no sipp entry in
  # node dmesg OOM) and NOT fd/socket exhaustion (RLIMIT_NOFILE 1048576; only "3
  # open sockets"; "0/0/0 UDP errors") and NOT the -l ceiling (5760 << 60000).
  # The single process could not service its timer wheel fast enough once it held
  # the whole cluster's dialogs AND was retransmitting thousands of 200 OKs
  # (scenario `<send retrans="500">`: 4509 retransmits at the crash) — the
  # scheduler resolution slipped, clock_tick fell behind wheel_base, SIPp aborts.
  # Halving per-pod concurrency (~5.7k -> ~2.9k each) keeps each timer wheel
  # serviceable, and one pod's death now loses only ~1/2 of B-leg dialogs.
  #
  # Routing holds with 2 replicas behind the existing ClusterIP Service:
  #   - NEW INVITEs: B2BUA_DEST resolves the sipp-uas ClusterIP VIP once at
  #     startup (20-worker.yaml); kube-proxy load-balances each new UDP flow
  #     across both endpoints, so offered INVITE load splits evenly.
  #   - IN-DIALOG (OPTIONS keepalive, BYE): the B2BUA pins each B-leg's
  #     remote_target to the *pod* Contact from that pod's 200 OK
  #     (rules/actions.rs sets d.sip.remote_target from the response Contact;
  #     uas-basic.xml emits Contact: <sip:[local_ip]...> = $(POD_IP)), so every
  #     in-dialog request goes straight to the owning pod — sticky by construction.
  # The Service (single ClusterIP/UDP port) and metrics wiring are untouched: the
  # UAS has no exporter sidecar (1 container) and is not scraped per-replica, so
  # scaling adds no metric collision.
  replicas: 5
  selector: { matchLabels: { app: sipp-uas } }
  template:
    metadata:
      labels: { app: sipp-uas }
    spec:
      nodeSelector: { tier: load }
      # Spread the replicas across the two tier=load nodes so each rides its own
      # node's CPU (timer-wheel servicing is CPU-bound) and a single node hiccup
      # cannot take out both. `preferred` (not `required`) so a rollout/restart
      # never wedges Pending if only one load node is schedulable.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: { app: sipp-uas }
      containers:
        - name: sipp-uas
          image: sipp:dev
          imagePullPolicy: IfNotPresent
          command: ["sipp"]
          # -i $(POD_IP) so SDP/Contact are routable inside the cluster.
          args:
            - "-sf"
            - "/scenarios/uas-basic.xml"
            - "-i"
            - "$(POD_IP)"
            - "-p"
            - "5060"
            # Explicit high open-call ceiling. The UAS holds EVERY in-flight dialog
            # for the whole cluster: long@5cps (≤6000 conc over a 20-min hold) +
            # short@100cps (~3000 conc) + abuse/limiter + the b2bua keepalive
            # OPTIONS traffic ⇒ ~9k+ simultaneous dialogs. Without -l, SIPp hit its
            # default ceiling and "Test Terminated" (exit 255) at ~3458 concurrent —
            # which WIPED all UAS dialog state and made BOTH b2bua workers tear down
            # their long calls (b-leg keepalive then unanswered → keepalive-timeout),
            # swamping the HA failover signal. Sized well above peak.
            - "-l"
            - "60000"
            # Reap a b-leg that goes silent for >10 min (an orphaned dialog whose
            # a-leg was killed, or a lost message) so stuck calls do not accumulate
            # and pin memory/slots — same reaper the UAC jobs carry (manifests/40).
            - "-recv_timeout"
            - "600000"
            - "-trace_err"
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
          ports:
            - { containerPort: 5060, protocol: UDP }
          # Memory is NOT the crash cause (see the replicas comment above): measured
          # RSS is ~132MB even holding thousands of dialogs, far under the 1Gi limit,
          # and no sipp process appears in the node's dmesg OOM log. The exit-255 was
          # a SIPp internal timer-wheel abort, addressed by halving per-pod load via
          # the 2-replica scale-out — not by more memory. Limit (1Gi) is kept well
          # under the ~1.19GB kind-node docker cap (cap-kind-memory.sh: 9216-2048
          # control-plane, /6 workers) so the UAS can never starve its node's
          # kubelet/containerd or a co-located UAC stream. CPU request bumped so the
          # scheduler reserves enough for timely timer-wheel servicing under load.
          # Generous CPU: the SIPp timer wheel is CPU-bound and a slip aborts the
          # process (exit 255) — so reserve a guaranteed core and allow a wide burst.
          # The 24-core load nodes have ample headroom (a load node runs ~1 UAS + 2
          # UAC jobs), so this never risks Pending. Memory stays 1Gi (RSS is ~132MB;
          # memory is not the constraint) under the 1.5GiB node cap.
          resources:
            requests: { cpu: "2", memory: "512Mi" }
            limits:   { cpu: "8", memory: "1Gi" }
          volumeMounts:
            - { name: scenarios, mountPath: /scenarios }
      volumes:
        - name: scenarios
          configMap: { name: sipp-scenarios }
---
apiVersion: v1
kind: Service
metadata:
  name: sipp-uas
  namespace: sip-test
spec:
  selector: { app: sipp-uas }
  ports:
    - { port: 5060, targetPort: 5060, protocol: UDP }
