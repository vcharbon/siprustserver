# kind cluster topology for the Rust SIP SUT — VENDORED COPY.
#
# Originally a symlink to ../../../sipjsserver/tests/k8s/cluster.yaml; copied
# in-tree at S11 so the Rust runner no longer depends on a sibling checkout and
# the two topologies may diverge. Still uses cluster name `sip-e2e` (the WSL
# one-cluster switch — see README), so `run.sh up` tears down any existing
# sip-e2e first, including sipjsserver's.
#
# Tiers: edge = front proxy, app = b2bua workers (two app nodes so a primary and
# its backup land on different nodes for real failover), load = sipp UAC/UAS.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sip-e2e
nodes:
  - role: control-plane
  - role: worker
    labels:
      tier: edge
  - role: worker
    labels:
      tier: edge
  - role: worker
    labels:
      tier: app
  - role: worker
    labels:
      tier: app
  - role: worker
    labels:
      tier: load
    extraPortMappings:
      - containerPort: 30060
        hostPort: 5060
        protocol: UDP
  # Second load node: the endurance profile runs long(~1750) + short(3000) +
  # abuse + 200cps peak bursts simultaneously; on a single load node they
  # exhausted memory and OOM'd the generators late in a 2h run. Spreading the
  # SIPp UAC/UAS pods across two load nodes (plus per-pod memory limits in
  # manifests/40-sipp-uac-job.yaml) keeps the generators alive for the full run.
  - role: worker
    labels:
      tier: load
