# kind cluster topology for the Rust SIP SUT — VENDORED COPY.
#
# Originally a symlink to ../../../sipjsserver/tests/k8s/cluster.yaml; copied
# in-tree at S11 so the Rust runner no longer depends on a sibling checkout and
# the two topologies may diverge. Still uses cluster name `sip-e2e` (the WSL
# one-cluster switch — see README), so `run.sh up` tears down any existing
# sip-e2e first, including sipjsserver's.
#
# Tiers: edge = front proxy, app = b2bua workers (two app nodes so a primary and
# its backup land on different nodes for real failover), load = sipp UAC/UAS.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sip-e2e
nodes:
  - role: control-plane
  - role: worker
    labels:
      tier: edge
  - role: worker
    labels:
      tier: edge
  - role: worker
    labels:
      tier: app
  - role: worker
    labels:
      tier: app
  # tier=load nodes REMOVED (sipext dual-plane layout): all load generators
  # (loadgen, sipp UAC/UAS, dnsmasq) run as plain docker containers on the
  # external `sipext` bridge, outside k8s, with their own --memory/--cpus caps
  # (run.sh). The extraPortMappings hostPort-5060 DNAT is gone with them — the
  # WSL host reaches the external VIP directly via the sipext bridge.
