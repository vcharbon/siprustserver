syntax = "proto3";

package sipjsserver.call;

// Mirrors the production `Call` schema (src/call/CallModel.ts).
// Codec swaps are fresh-cluster events (ADR-0011) so schema/wire
// compatibility across versions is intentionally not maintained.
//
// Field-id stability rules (within a release):
//   1. Never reuse a deleted id.
//   2. Append-only on each message; do not reorder ids.
//
// Side-channel JSON fields (transferJson, featuresJson, etc.) carry
// open or `Schema.Unknown` unions that don't admit a structural encoding.
//
// `*IsNull` siblings preserve the JS-level `null` distinction for
// `Schema.NullOr(T)` fields where T is a value type. Proto3 cannot
// distinguish "absent" from "null", so the null bit is explicit.

message RemoteInfo {
  string address = 1;
  int32 port = 2;
}

message SipHeader {
  string name = 1;
  string value = 2;
}

message PendingRequest {
  string method = 1;
  int32 outboundCSeq = 2;
  int32 inboundCSeq = 3;
  repeated string sourceVias = 4;
  string sourceCallId = 5;
  string sourceFrom = 6;
  string sourceTo = 7;
  string direction = 8;
}

message StackDialog {
  string callId = 1;
  string localTag = 2;
  string remoteTag = 3;
  string localUri = 4;
  string remoteUri = 5;
  string remoteTarget = 6;
  int32 localCSeq = 7;
  repeated string routeSet = 8;
}

message B2buaDialogExt {
  // `Schema.NullOr(Int)` — null carried via `remoteCSeqIsNull`.
  optional int32 remoteCSeq = 1;
  optional bool remoteCSeqIsNull = 2;
  repeated PendingRequest inboundPendingRequests = 3;
  optional string ackBranch = 4;
  // InviteTxnHandle carries `originalInvite: Schema.Unknown` (best-effort).
  optional string pendingInviteTxnJson = 5;
  optional bytes cachedSdp = 6;
}

message Dialog {
  StackDialog sip = 1;
  B2buaDialogExt ext = 2;
}

message Leg {
  string legId = 1;
  string callId = 2;
  string fromTag = 3;
  RemoteInfo source = 4;
  string state = 5;
  string disposition = 6;
  repeated Dialog dialogs = 7;
  optional double noAnswerTimeoutSec = 8;
  optional string byeDisposition = 9;
  optional string localUri = 10;
  optional string remoteUri = 11;
  optional string inviteRequestUri = 12;
  optional string pendingInviteTxnJson = 13;
  // Per-service opaque ext slices (ADR-0016), JSON-string.
  optional string extJson = 14;
  // Leg role + adoption (ADR-0014). Optional → absent on legacy bodies.
  optional string kind = 15;
  optional bool adopted = 16;
}

message ALegInvite {
  string uri = 1;
  repeated SipHeader headers = 2;
  bytes body = 3;
}

message TagMapping {
  string aTag = 1;
  string bLegId = 2;
  string bTag = 3;
}

message CallLimiterState {
  string limiterId = 1;
  int32 limit = 2;
  double originWindow = 3;
  optional bool incrementSucceeded = 4;
}

message TimerEntry {
  string id = 1;
  string type = 2;
  double fireAt = 3;
  optional string legId = 4;
}

message CdrEvent {
  string type = 1;
  double timestamp = 2;
  string legId = 3;
  optional int32 statusCode = 4;
  optional string reason = 5;
}

message CallTopology {
  string pri = 1;
  string bak = 2;
  int32 gen = 3;
}

message ActiveRule {
  string id = 1;
  // `params: optional unknown` — absence vs presence preserved via paramsPresent.
  bool paramsPresent = 2;
  optional string paramsJson = 3;
  bool active = 4;
}

message RuleStateEntry {
  string ruleId = 1;
  bool statePresent = 2;
  optional string stateJson = 3;
}

message ActivePeer {
  string legA = 1;
  string legB = 2;
}

message Call {
  string callRef = 1;
  Leg aLeg = 2;
  repeated Leg bLegs = 3;
  // `Schema.NullOr(ActivePeer)` — null vs object distinguished by
  // `activePeerIsNull` (always set so the field is explicit on the wire).
  optional ActivePeer activePeer = 4;
  bool activePeerIsNull = 5;

  optional string callbackContext = 6;
  // `Schema.optional(Schema.NullOr(Schema.String))` — three states.
  optional string billingContext = 7;
  optional bool billingContextIsNull = 8;

  ALegInvite aLegInvite = 9;
  repeated CallLimiterState limiterEntries = 10;
  repeated TimerEntry timers = 11;
  repeated CdrEvent cdrEvents = 12;
  string state = 13;
  double createdAt = 14;

  // `Schema.optional(Schema.Array(_))` — empty arrays survive via
  // `aLegPendingViasPresent`. Without it, `[]` round-trips to `undefined`.
  repeated string aLegPendingVias = 15;
  bool aLegPendingViasPresent = 16;

  optional int32 aLegPendingCSeq = 17;
  repeated TagMapping tagMap = 18;
  optional string traceId = 19;
  optional string rootSpanId = 20;
  optional bool sampled = 21;
  optional int32 workerIndex = 22;
  optional CallTopology topology = 23;
  optional bool emergency = 24;

  // Closed/open union side-channels (JSON-string).
  optional string featuresJson = 25;
  optional string policyUpdateHeadersJson = 26;
  optional bytes policyUpdateBody = 27;
  optional bool policyUpdateBodyIsNull = 28;

  // Optional repeated fields — presence carried explicitly.
  repeated ActiveRule activeRules = 29;
  bool activeRulesPresent = 30;
  repeated RuleStateEntry ruleState = 31;
  bool ruleStatePresent = 32;

  // ids 33/34 (transfer{Json,IsNull}) retired with the REFER service migration
  // (ADR-0016) — transfer state now rides inside the generic `ext` carry
  // (extJson). ids 35/36 (earlyPromote{Json,IsNull}) retired earlier. Not reused.

  optional int32 messageCount = 37;
  repeated string terminatingRefreshLegs = 38;
  bool terminatingRefreshLegsPresent = 39;

  // Per-service opaque ext slices (ADR-0016), JSON-string.
  optional string extJson = 40;
}
