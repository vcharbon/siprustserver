[package]
name = "sip-net"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "SIP signaling network layer (UDP transport + SignalingNetwork) — Rust port of sipjsserver src/sip/{SignalingNetwork,UdpTransport} core. Real (tokio), simulated (in-memory fabric), and a recording/audit decorator."

[dependencies]
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
socket2 = { workspace = true }
layer-harness = { path = "../layer-harness" }
sip-clock = { path = "../sip-clock" }
sip-message = { path = "../sip-message" }

[dev-dependencies]
# `test-util` adds the paused-clock lever (`tokio::time::pause`/`advance`) the
# BufferedUdpEndpoint sweep/idle-TTL tests drive (`#[tokio::test(start_paused)]`).
tokio = { workspace = true, features = ["test-util"] }
