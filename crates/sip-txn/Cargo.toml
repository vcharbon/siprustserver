[package]
name = "sip-txn"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "SIP transaction layer (RFC 3261 §17 client/server FSMs + retransmission timers) — Rust port of sipjsserver src/sip/TransactionLayer.ts. Shared by proxy and B2BUA; the per-call FIFO dispatch (SipRouter/PerCallDispatcher) is a B2BUA-only later slice."

[dependencies]
tokio = { workspace = true }
tokio-util = { workspace = true }
sip-message = { path = "../sip-message" }
sip-net = { path = "../sip-net" }

[dev-dependencies]
# `test-util` adds the paused-clock lever (`tokio::time::pause`/`advance`) —
# the test analogue of Effect's `TestClock`. Features are additive over the
# workspace `full`.
tokio = { workspace = true, features = ["test-util"] }
