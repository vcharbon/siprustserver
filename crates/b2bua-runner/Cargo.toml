[package]
name = "b2bua-runner"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Standalone runnable B2BUA process: binds a real UDP endpoint (non-recording RealSignalingNetwork) and routes every call to a fixed destination. For localhost SIPp load tests (UAC -> B2BUA -> UAS)."

[[bin]]
name = "b2bua-runner"
path = "src/main.rs"

[dependencies]
b2bua = { path = "../b2bua" }
call = { path = "../call" }
sip-net = { path = "../sip-net" }
sip-txn = { path = "../sip-txn" }
sip-clock = { path = "../sip-clock" }
tokio = { workspace = true }
async-trait = { workspace = true }
