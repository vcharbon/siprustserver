[package]
name = "topology"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Shared, port-agnostic cluster-membership seam (slice S1a of the HA-replication migration). A leaf crate consumed by BOTH the front proxy and the b2bua replication engine: a `Peer` is ordinal+host (no port — membership, not transport), `MembershipState` is the lock-free ArcSwap+broadcast backing, and `Membership` is the read seam. Health is deliberately NOT modelled here — it is a proxy-layer concern layered on top. Preserves ADR-0002 acyclicity: proxy/b2bua → topology, never the reverse."

[dependencies]
# Lock-free snapshot read (mirrors RegistryState's ArcSwap) + broadcast deltas.
arc-swap = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
# Injected clock for the simulated driver (timestamps only; behaviour rides
# tokio::time directly). Leaf dep — sip-clock depends on nothing back here.
sip-clock = { path = "../sip-clock" }

# --- `kube` feature (S11): the real K8sMembership EndpointSlice informer. ---
# Optional + off by default so the proxy/b2bua libraries and the fake-clock test
# tiers never compile the kube client stack; only the b2bua-runner enables it.
# `tracing` lets the informer log connect/watch errors without panicking the
# runner. EndpointSlice lives in `k8s-openapi::discovery::v1`.
kube = { version = "1", default-features = false, features = ["client", "runtime", "rustls-tls"], optional = true }
k8s-openapi = { version = "0.25", default-features = false, features = ["latest"], optional = true }
futures = { version = "0.3", optional = true }
tracing = { version = "0.1", optional = true }

[features]
# Pull in the real Kubernetes EndpointSlice informer (K8sMembership). Default
# builds stay kube-free; the runner opts in.
kube = ["dep:kube", "dep:k8s-openapi", "dep:futures", "dep:tracing"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
