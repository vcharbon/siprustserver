[package]
name = "sip-proxy-runner"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Standalone runnable SIP front proxy: binds a real UDP endpoint (non-recording RealSignalingNetwork), load-balances new dialogs across a static worker pool with HMAC-signed Record-Route stickiness, runs OPTIONS health probing, and serves Prometheus /metrics. For containerized localhost/k8s load tests (UAC -> proxy -> B2BUA workers -> UAS)."

[lints]
workspace = true

[[bin]]
name = "sip-proxy-runner"
path = "src/main.rs"

[dependencies]
sip-proxy = { path = "../sip-proxy" }
# The shared HTTP probe/metrics server: /metrics, /healthz, /readyz, and the
# /debug/flamegraph pprof route — one module shared with the b2bua worker.
probe-http = { path = "../probe-http" }
sip-net = { path = "../sip-net" }
sip-txn = { path = "../sip-txn" }
sip-clock = { path = "../sip-clock" }
# Cluster membership: the shared topology crate with the kube EndpointSlice
# informer (ADR-0012 D4) so the proxy discovers workers from k8s — the SAME watch
# the b2bua replication engine uses (ADR-0011 X7). Static PROXY_WORKERS remains a
# dev/local fallback.
topology = { path = "../topology", features = ["kube"] }
# Default in-cluster kube client for K8sMembership.
kube = { version = "1", default-features = false, features = ["client", "rustls-tls"] }
# rustls 0.23 ships no compile-time default CryptoProvider unless a provider
# feature is enabled; install one before the first TLS handshake (mirrors the
# b2bua-runner) or the kube client panics.
rustls = { version = "0.23", default-features = false, features = ["ring"] }
tokio = { workspace = true }

# jemalloc global allocator + its stats probe (see the #[global_allocator] note
# in src/main.rs). The front proxy is single-task but still churns SIP buffers
# under sustained load; using the same decay-purging allocator as the b2bua
# keeps RSS bounded and makes the soak's memory story uniform across both tiers.
# unix-only (jemalloc has no MSVC target).
[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = "0.7"
jemalloc-stats = { path = "../jemalloc-stats" }
